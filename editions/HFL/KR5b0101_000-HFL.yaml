front:
  text: 太上大道三元品誡謝罪上法位六天尊言凡修上法常以正月十五日七月十五日十月十五日平旦正中夜半三時沐浴身形五香自洗臨沐浴時向西南以金杓廻香湯東南左轉三十二過閉眼思日光在左目上月光在右目上五星纓絡頭上五色之雲帀繞一身青龍白虎朱雀玄武獅子白鶴羅列左右仙童執巾玉女㪚華飛仙乗騎侍衛身形便叩齒二十一通呪曰天澄氣清五色髙明日月吐暉灌我身形神津内盥香湯錬精光景洞曜煥映上清氣不受塵五府納靈罪滅三塗禍消九冥惡根斷絶福慶自生今日大願一切告盟身受開度升入帝庭
