body:
  text: 畢仰嚥三十二過止便洗沐五神也沐浴畢冠帶衣服又叩齒十二通呪曰五濁巳清八景巳明今日受錬罪滅福生長與五帝齋眞上靈便出而入室依法行道也入室東向燒香叩齒三十二通祝曰无上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香玉童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓此間土地里域眞官正神臣今正爾燒香行道陳乞所願願得十方正眞之氣入臣等身中令所啓速達上聞无極天尊太上太道至眞上帝几前无上洞玄靈寳弟子某嶽先生臣某宿世縁㑹得生道化蒙三洞法師先生某所見啓拔開度腐骸參以經法過泰之恩實在罔極而臣生長流俗五神爭競塵深罪穢永不自覺與罪同長山海彌積前生至今不知縁來凡以幾劫逮及今日罪結天地在何簿目爲三官執舉拘逮地役雖自修勵而无感徹眞靈不降衆魔所伐致思念不專五神飛越常恐一旦歸命幽壑彌綸萬劫終天无抜謹以三元大慶吉日清齋燒香首謝前身及乎今日積行所犯天所不原地所不赦神所不哀鬼所不放億罪兆過觸犯三元百八十條三宫九府百二十曹隂陽水火左右中宫考吏之罪今故燒香歸身歸神歸命无極天尊太上道君三十二天上帝十方大聖衆至眞諸君丈人飛天神王天仙飛仙神仙地仙五嶽諸眞人玉女諸天日月星宿璇璣玉衡及地上十方无極諸靈官三界五帝三官九府百二十曹三河四海九江八極衆神靈司諸官乞賜大恩一切原除宿身今生所犯之罪以今燒香功德抜度罪根願削除地簡絶滅右府黒簿罪録度上南宫左府長生青録之中神仙度世永享无窮得道之後升入无形與眞合同第一東向九拜長跪言臣某今歸命東方无極太上靈寳天尊巳得道大聖衆至眞尊神太清玄元无上三天无極大道无上玄老太上老君太上丈人皇上老君皇上丈人青靈上眞諸天帝君諸天帝丈人太帝君太帝丈人九老仙都君九氣丈人等百千萬重道氣千二百官君太清玉陛下東極老人青華大神上相司馬青童君金闕後聖帝君眞陽始青神人靈寳九仙君等青和玉女主仙玉郎東方无極世界一切神靈乞願直垂大慈開宥之恩原臣身前生以來逮及今日受生所犯上不敬諸天大聖尊神東方无極世界一切神靈日月星宿四時五行風雨雷電雲霧時節下不敬師父尊長五嶽四瀆三河四海九江八極諸眞人神仙玉女東郷諸靈官三界地祇三官九署一切神明欺師罔道穢賤天經竊盜聖文攺易靈音宣傳至法貪利入身私相化授五帝无盟謀圖叛逆行不忠不慈不孝不愛不仁上逆君父下殺衆生掠奪人物婬犯他妻骨肉相加門族交通嫉妬勝已爭競功名口是心非攻擊賢人飲酒食肉濁注五神罵詈呪詛自作无端八齋吉日喜怒无常輕孤賤寡棄薄老人凌賤貧窮逐寵豪强諸如此罪不可勝紀積世結固纒綿不解以今燒香歸命東方乞願大慈直垂哀原赦除臣身前生億劫以來至今身所犯諸如上之罪乞賜更始於今自攺伏從禁戒不敢又犯乞削地簡三官罪録右宫黒簿惡對重根度名左府青録之中今日大慶萬願開陳謹自首謝歸命天尊乞神乞仙與眞合同門戸興泰善縁來生世世罔極長享自然畢便解巾叩頭自搏各九十過止謝東方畢次起左行向東南一拜長跪言臣某今歸命東南无極太上靈寳天尊巳得道大聖衆至眞尊神南上老君丹靈老子南極上元長生眞人度世司馬司命司録好生韓君起死更生錬骨還神大聖神王萬福君萬福丈人太和玉女東南无極世界一切神靈乞恩謝如東方法畢叩頭自搏各一十二過止謝東南畢次起左行向南方三拜長跪言臣某今歸命南方无極太上靈寳天尊巳得道大聖衆至眞尊神无極大道南上赤帝丹靈老子太和玉女長生司馬好生君司命司録南極度世君飛天眞人開度受生神王玉曆注生神仙度世君萬福萬度萬生萬氣君南方无極世界一切神靈謝如上法畢叩頭自搏各三十過止謝南方畢次起左行向西南方一拜長跪言臣某今歸命西南元極太上靈寳天尊巳得道大聖衆至眞尊神天皇老人南極元眞君洞陽大靈衆神生氣飛眞神王神仙玉女西南无極世界一切神靈乞恩謝如上法畢叩頭自搏各一十二過止謝西南畢次起左行向西方七拜長跪言臣某今歸命西方无極太上靈寳天尊巳得道大聖衆至眞尊神无極大道西華太妙至極上帝金堂玉仙眞毋金闕後聖上相帝君玄古天師萬聖道主四極眞人神仙玉女西方无極世界一切神靈乞恩謝如上法畢叩頭自搏各七十過止謝西方畢次左行向西北一拜長跪言臣某今歸命上方无極太上靈寳天尊巳得道大聖衆至眞尊神无極大道上下中央四面八方三十二天上帝太上无爲大道諸君丈人最大至尊无上无巓无極无窮普照普察无量洞明最上正眞无鞅數衆道氣元始元先寥廓无端混沌无形虚无自然太上元根冥寂玄通大智慧原正一盟威太上无爲大道道中之道神明君无上无初萬萬億億數无鞅數道德諸君丈人太上道德君道德丈人无上萬生君萬生丈人无上萬氣君萬氣丈人无上萬元君萬元丈人无上萬福君萬福丈人溟涬天神諸君丈人新岀老君太清玄元上三天无極大道无上丈人太上三氣君太上老君太上丈人太清君太清丈人太玄上一君太玄丈人中黄正一君中黄丈人太元君太元丈人太始君太始丈人太𥘉君太初丈人太素君太素丈人太虚君太虚丈人太一君太一丈人太儀君太儀丈人太平君太平丈人太淵君太淵丈人天帝君天帝丈人九老仙都君九老丈人玉曆君玉曆丈人九氣君九氣丈人等百千萬億億萬萬數无鞅數萬重道氣丈人千二百官君千二百官丈人太清玉陛下太上玉眞君玉眞丈人五仙君五仙丈人九靈君九靈丈人太清十二眞君十二眞君丈人二十四神君二十四神君丈人太清三十六眞君三十六眞君丈人五氣君五氣丈人隂陽生氣君生氣丈人上上太一君太一丈人皇天太上帝皇天太上丈人无極太上元君太上元君丈人太一君太一丈人神寳君神寳丈人眞寳君眞寳丈人天寳君天寳丈人靈寳君靈寳丈人元神君元神丈人元眞君元眞丈人元靈君元靈丈人皇老君皇老丈人南極君南極丈人黄神老君黄神丈人黄老君黄老丈人太和君太和丈人太上皇眞道君諸君丈人上古天師君天師丈人三師君三師丈人萬道父母萬德父母天地父母神仙所出神仙所聚東王公西王母日君月夫人五星君五星皇妃璇璣玉衡九星眞君衆仙眞人聖父聖母神仙玉女上方彌羅比天无極世界一切神靈乞恩謝如上法畢叩頭自搏各三百二十過止謝上方畢次左行向東北日宫三拜長跪言臣某今歸命日君夫人日中皇華洞明太光童子丹霞玉女日中諸神仙乞丐原臣受生所行罪負上觸天光生死殃對並蒙赦除身得光明與日同景長享无極受福自然畢叩頭自搏各三十過止謝日宫畢次起左行向西南月宫七拜長跪言臣某今歸命月君夫人石景水母圎光童子散輝玉女月宫諸神仙乞丐原臣受生所行罪負上觸天光生死殃對並蒙原除身得光明與月同景長享无極受福自然畢叩頭自搏各七十過止謝月宫畢次左行向北九拜長跪言臣某今歸命諸天星宿璇璣玉衡七星北斗九星三台五星夫人二十八宿周天三百六十五度星中大神星中眞皇夫人靈妃神仙玉女乞丐原臣受生所行罪負上觸天光生死殃對並蒙原除身得光明與星宿同景長享無極受福自然畢叩頭自搏各三百六十過止謝星官畢次左行向東嶽再拜長跪言臣某今歸命東嶽泰山青帝大神飛仙眞人神仙諸靈官名山大澤一切神靈乞丐原臣受生以來所行罪負上觸東嶽名山大神元惡之罪並蒙赦宥削除罪簡名上仙録得與大神交友自然畢叩頭自搏各二十過止次向南方再拜長跪言臣某今歸命南嶽衡山赤帝大神飛仙眞人神仙諸靈官名山大澤一切神靈乞丐謝如東嶽法次向西南再拜長跪言臣某今歸命中嶽嵩山黄帝大神飛仙眞人神仙諸靈官名山大澤一切神靈乞丐謝如東嶽法次向西再拜長跪言臣某今歸命西嶽華山白帝大神飛仙眞人神仙諸靈官名山大澤一切神靈乞丐謝如東嶽法次向北再拜長跪言臣某今歸命北嶽恒山黒帝大神飛仙眞人神仙諸靈官名山大澤一切神靈乞丐謝如東嶽法謝五嶽畢次左行向北方十二拜謝水官言臣某今歸命扶桑大帝暘谷神王洞源洞淵清泠大神三河四海九江水帝十二淮濟河伯河侯河中二千石清河夫人水府神仙一切諸靈官乞丐原臣前生以來至于今日所行罪負无數愆目觸犯水官元惡之罪乞見原赦今日燒香首謝大神歸命歸身乞得生活免諸罪根削除水簡縁對上名生録神仙簿中長享无極與道合眞叩頭自搏各二百八十過止謝水官畢次向北三拜謝三寳神經長跪言臣某今歸命太上无極大道至眞无上三十六部尊經三寳靈文神仙圖籙符章自然天書金書玉字侍經玉童玉女三部威神乞丐謝如東嶽法畢叩頭自搏各三百六十過止齋竟言功法衆官一時東向長跪叩齒二十四通稱所受官如具稽首再拜上啓太上无極大道太上大道君太上老君太上丈人无上玄老十方无極大道道德衆聖天尊至眞太帝天帝天師君靈寳監齋大法師臣等素自凡愚不以穢賤好道樂仙謬受法任得騰景九玄志竭愚短自効毛髪共相𢹂率以今月如干日某時於某郡縣郷里中建立齋直燒香誦經思神念眞如干日夜某時行道請謝修行事竟所啓上清三洞飛仙天仙地仙五方天兵騎乗及侍經侍香玉童玉女靈寳官屬監齋衆眞五嶽四瀆四方監察眞官靈仙謁還眞宮進品上仙加爵帝秩隨品署眞當如太眞之儀令臣等求道得道求仙得仙令臣等分形變化七十四方三元下降降致緑軿飛行上清騰景九天日月同暉三寳齊輪惟蒙至聖監映丹情臣等學法未備俯仰之格齋法難精不合儀式進止犯科爲四司所紏五帝所執千愆萬罪乞蒙赦貰哀原未悟不見罪罰臣等身中五體眞官隨功上詣玄都受秩事竟還臣等身與臣同升飛行太空謹上啓聞伏須告報臣等誠惶誠恐稽首再拜謝畢左行還西向東三上香呪曰香官使者左右龍虎君捧香驛龍騎吏當令臣靜室齋堂生自然金液丹精百靈芝英交㑹在此香火前令臣得道遂獲神仙舉家蒙福上下受恩十方玉童玉女侍衛香煙傳臣所啓徑御无極太上大道前天尊言其三元品誡謝罪上法三元宫中隱存形神精思罪根修仙上道學士一歳三過行之行之當令心丹意盡神形同苦无有怠倦感徹諸天三元削罪於黒簿北帝落死而上生三官保舉於學功太玄記録於上仙夫求道者非苦不徹非丹不感非勤不獲非功不得非志不克非心不成也當使形勞於始神懽於終終得无爲克入自然罪滓之人貪翫珍寳見世之懽一時之榮豈知有終終歸於苦塗炭三宫長淪萬劫何時得還故賢愚各尚志業不同愚者貴始賢者重終愚智相殊豈可言哉天尊言夫爲學者身經三元上吉之日香湯自錬沐浴五神則氣澄形正神爽結眞體不受穢氣不受塵三關清虚萬邪不千三部八景洞明身中服御導引五府生薫内外充溢悉得成仙上士飛騰駕景乗雲中士隱化坐在立亡下士滅度轉輪聖王滅而不絶終得神仙其法髙妙微難可勝今以相告勤爲用心道君稽首伏受要言天尊言夫爲積學未得道者皆由己身負其宿對三官所舉九府所執百二十曹左右考官文書考逮惡根不滅邪魔侵伐致五神爭競身犯不覺罪穢日生神眞飛越雖見衆法而罪根不釋徒爲勞心至死无獲今三元大慶開生吉日諸天迴駕衆聖同集推校生死功過録籍道法普慈愛民育物見其罪者名入死目終劫相牽永无解脫學而无益甚可痛焉今開紫陽玉笈出三元品誡謝過上法以度學者成其功德宣告天科各條學士未得道者功過多少咸使有心承受大法落滅罪簿上名仙録於今更始普告諸天无髙无下无深无逺无大无小无窮无極无幽无隱无音无響冥寂玄通大智慧原三宮九府百二十曹一切神靈莫不承奉於是諸天大聖衆无極尊神太上道君一時長立舉手告衆彈指稱善是時天尊開大宥之恩諸天男女始學者莫不恭奉修行大法皆即受度身得神仙白日登虚上升帝宫其有善心信向之人敬而奉之皆得開度轉輪生死不經地役功成德滿並得仙道位齊飛天遊乎十方也天尊言夫以三元上吉之日修行三元品誡謝罪之法則三宫九府右别録籍五帝保舉列名諸天衆眞懽喜萬神開宥宿對披散罪根普解三㑹感徹三宫九府百二十曹考逮削落黒簡斷絶宿根勒名左契青録之中萬靈侍護三界司迎妖魔降伏千災不干道眞自生克得神仙太上大道三元品誡謝罪上法
